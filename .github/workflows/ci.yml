name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { php: '8.3', laravel: '12.*' }
          - { php: '8.4', laravel: '12.*' }
          - { php: '8.4', laravel: '13.*' }
          - { php: '8.5', laravel: '12.*' }
          - { php: '8.5', laravel: '13.*' }
    name: Tests · PHP ${{ matrix.php }} · Laravel ${{ matrix.laravel }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, fileinfo, intl
          coverage: none

      - name: Install dependencies
        run: |
          composer require "illuminate/contracts:${{ matrix.laravel }}" --no-update --no-interaction
          composer update --prefer-dist --no-interaction --no-progress

      - name: Pest
        run: vendor/bin/pest

  quality:
    runs-on: ubuntu-latest
    name: Quality (Pint + PHPStan)
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Pint (code style)
        run: vendor/bin/pint --test

      - name: PHPStan (static analysis, level max)
        run: vendor/bin/phpstan analyse --no-progress --memory-limit=512M
